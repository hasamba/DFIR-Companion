<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>DFIR Companion Dashboard</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #0f1115; color: #e6e6e6; }
    header { padding: 12px 16px; background: #161a22; display: flex; gap: 12px; align-items: center; }
    main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; }
    section { background: #161a22; border-radius: 8px; padding: 12px; }
    h2 { margin: 0 0 8px; font-size: 14px; text-transform: uppercase; letter-spacing: .05em; color: #9aa4b2; }
    .sev-Critical { color: #ff5c5c; } .sev-High { color: #ff9f43; }
    .sev-Medium { color: #ffd93b; } .sev-Low { color: #6bcB77; } .sev-Info { color: #6aa9ff; }
    .finding { border-left: 3px solid #2a2f3a; padding: 6px 10px; margin-bottom: 8px; }
    button { background: #2d6cdf; color: white; border: 0; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    input { background: #0f1115; color: #e6e6e6; border: 1px solid #2a2f3a; padding: 6px; border-radius: 6px; }
    #status { font-size: 12px; color: #9aa4b2; }
    #aiStatus { font-size: 12px; padding: 3px 8px; border-radius: 10px; }
    .ai-unknown { background: #2a2f3a; color: #9aa4b2; }
    .ai-off { background: #2a2f3a; color: #9aa4b2; }
    .ai-idle { background: #1e3a2a; color: #6bcB77; }
    .ai-analyzing { background: #3a3320; color: #ffd93b; }
    .ai-error { background: #3a2020; color: #ff5c5c; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
    .ai-analyzing { animation: pulse 1s ease-in-out infinite; }
  </style>
</head>
<body>
  <header>
    <strong>DFIR Companion</strong>
    <input id="caseId" placeholder="caseId" />
    <button id="connect">Connect</button>
    <button id="aiToggle" title="Turn AI analysis on/off for this case">AI: …</button>
    <button id="synthesize" title="Derive findings, MITRE and attacker path from the timeline">Synthesize</button>
    <button id="generateReport">Generate Report</button>
    <span id="status">disconnected</span>
    <span id="aiStatus" class="ai-unknown" style="margin-left:auto; font-weight:bold;">AI: —</span>
    <span id="captureCount" style="font-weight:bold;">Screenshots: 0</span>
  </header>
  <main>
    <section style="grid-column: 1 / -1"><h2>Executive Summary</h2><div id="summary">—</div></section>
    <section style="grid-column: 1 / -1"><h2>Key Investigative Questions</h2><div id="keyQuestions">—</div></section>
    <section style="grid-column: 1 / -1"><h2>Attacker Path</h2><div id="attackerPath">—</div></section>
    <section style="grid-column: 1 / -1"><h2>Forensic Timeline (by event time)</h2><div id="forensicTimeline">—</div></section>
    <section><h2>Findings</h2><div id="findings">—</div></section>
    <section><h2>IOCs</h2><div id="iocs">—</div></section>
    <section><h2>Investigation Threads</h2><div id="openThreads">—</div><div id="closedThreads"></div></section>
    <section><h2>Investigation Log</h2><div id="timeline">—</div></section>
    <section><h2>MITRE ATT&amp;CK</h2><div id="mitre">—</div></section>
    <section style="grid-column: 1 / -1"><h2>Confirmed Legitimate (excluded from analysis)</h2><div id="legitimate">—</div></section>
  </main>
  <script>
    const SEV = ["Critical", "High", "Medium", "Low", "Info"];
    let ws = null;
    let countTimer = null;
    let aiEnabled = true;

    function renderAiToggle() {
      const b = document.getElementById("aiToggle");
      b.textContent = aiEnabled ? "AI: ON" : "AI: OFF";
      b.style.background = aiEnabled ? "#2d6cdf" : "#555";
    }

    function aiToggleUnavailable() {
      const b = document.getElementById("aiToggle");
      b.textContent = "AI: ?";
      b.title = "AI control endpoint missing";
      document.getElementById("status").textContent =
        "AI toggle unavailable — restart the companion server (stop it, then `npm run dev`) to load the latest endpoints.";
    }

    function loadAiToggle(caseId) {
      fetch(`/cases/${caseId}/ai-control`)
        .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(c => { aiEnabled = !!c.enabled; renderAiToggle(); })
        .catch(() => aiToggleUnavailable());
    }

    function toggleAi() {
      const caseId = document.getElementById("caseId").value.trim();
      if (!caseId) return;
      const next = !aiEnabled;
      fetch(`/cases/${caseId}/ai-control`, {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ enabled: next }),
      })
        .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(c => {
          aiEnabled = !!c.enabled;
          renderAiToggle();
          document.getElementById("status").textContent =
            aiEnabled ? "AI on — catching up on un-analyzed screenshots…" : "AI off — capturing only";
        })
        .catch(() => aiToggleUnavailable());
    }

    function fmtTime(iso) {
      try { return new Date(iso).toLocaleTimeString(); } catch { return iso; }
    }

    function setAi(kind, text) {
      const el = document.getElementById("aiStatus");
      el.className = "ai-" + kind;
      el.textContent = "AI: " + text;
    }

    function applyAiStatus(evt) {
      if (evt.status === "analyzing") setAi("analyzing", "analyzing… " + (evt.detail || ""));
      else if (evt.status === "idle") setAi("idle", "up to date (" + fmtTime(evt.at) + ")");
      else if (evt.status === "error") setAi("error", "error — " + (evt.detail || "see server log"));
    }

    function pollCount(caseId) {
      if (countTimer) clearInterval(countTimer);
      const update = () =>
        fetch(`/cases/${caseId}/captures/count`)
          .then(r => r.json())
          .then(d => document.getElementById("captureCount").textContent = `Screenshots: ${d.count}`)
          .catch(() => {});
      update();
      countTimer = setInterval(update, 3000);
    }

    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function escAttr(s) { return esc(s).replace(/"/g, "&quot;"); }

    function legitBtn(kind, ref) {
      return `<button class="legit-btn" data-kind="${escAttr(kind)}" data-ref="${escAttr(ref)}" ` +
        `style="font-size:10px;padding:1px 6px;background:#3a3320;color:#ffd93b;border:0;border-radius:8px;cursor:pointer" ` +
        `title="Mark as legitimate (client-confirmed benign) — excluded from analysis">legit</button>`;
    }

    function renderLegitimate(markers) {
      const el = document.getElementById("legitimate");
      el.innerHTML = (markers && markers.length)
        ? markers.map(m =>
            `<div style="margin-bottom:4px"><span style="color:#9aa4b2">${esc(m.kind)}:</span> ` +
            `<span style="text-decoration:line-through">${esc(m.ref)}</span>` +
            `${m.note ? ` — <small>${esc(m.note)}</small>` : ""} ` +
            `<button class="unlegit-btn" data-id="${escAttr(m.id)}" style="font-size:10px;padding:1px 6px;cursor:pointer">un-mark</button></div>`
          ).join("")
        : "<div style='color:#9aa4b2'>Nothing marked legitimate.</div>";
    }

    function loadLegitimate(caseId) {
      fetch(`/cases/${caseId}/legitimate`).then(r => r.json()).then(renderLegitimate).catch(() => {});
    }

    // Event delegation for the dynamically-rendered legit / un-mark buttons.
    document.addEventListener("click", (e) => {
      const caseId = document.getElementById("caseId").value.trim();
      if (!caseId) return;
      const mark = e.target.closest(".legit-btn");
      if (mark) {
        const kind = mark.dataset.kind, ref = mark.dataset.ref;
        const note = prompt(`Mark this ${kind} as legitimate. Reason (optional):`, "");
        if (note === null) return; // cancelled
        document.getElementById("status").textContent = "marking legitimate & re-synthesizing…";
        fetch(`/cases/${caseId}/legitimate`, { method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ kind, ref, note }) })
          .then(r => r.json()).then(renderLegitimate).catch(() => {});
        return;
      }
      const un = e.target.closest(".unlegit-btn");
      if (un) {
        fetch(`/cases/${caseId}/legitimate/remove`, { method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ id: un.dataset.id }) })
          .then(r => r.json()).then(renderLegitimate).catch(() => {});
      }
    });

    function render(state) {
      document.getElementById("summary").textContent = state.lastSummary || "—";
      document.getElementById("attackerPath").textContent = state.attackerPath || "—";

      const QMARK = { answered: "✅", partial: "🟡", unknown: "❓" };
      const kq = state.keyQuestions || [];
      document.getElementById("keyQuestions").innerHTML = kq.length
        ? kq.map(q =>
            `<div class="finding"><strong>${QMARK[q.status] || "❓"} ${esc(q.question)}</strong>` +
            `<br><small>${esc(q.answer || "unknown")}</small>` +
            `${q.pointer ? `<br><small style="color:#6aa9ff">→ ${esc(q.pointer)}</small>` : ""}</div>`
          ).join("")
        : "<div style='color:#9aa4b2'>Not assessed yet — run Synthesize.</div>";

      const iocs = state.iocs || [];
      document.getElementById("iocs").innerHTML = iocs.length
        ? iocs.map(i => `<div><span style="color:#9aa4b2">${esc(i.type)}:</span> ${esc(i.value)} ${legitBtn("ioc", i.value)}</div>`).join("")
        : "<div style='color:#9aa4b2'>No IOCs yet</div>";

      const ft = state.forensicTimeline || [];
      document.getElementById("forensicTimeline").innerHTML = ft.length
        ? ft.map(e =>
            `<div class="finding"><span class="sev-${esc(e.severity)}">${esc(e.timestamp || "(undated)")}</span> ` +
            `<strong>${esc(e.description)}</strong>` +
            `${e.mitreTechniques && e.mitreTechniques.length ? `<br><small>MITRE: ${esc(e.mitreTechniques.join(", "))}</small>` : ""}` +
            `${e.relatedFindingIds && e.relatedFindingIds.length ? `<br><small>findings: ${esc(e.relatedFindingIds.join(", "))}</small>` : ""}</div>`
          ).join("")
        : "—";

      const openThreads = state.openThreads.filter(t => t.status === "open");
      const closedThreads = state.openThreads.filter(t => t.status === "closed");
      document.getElementById("openThreads").innerHTML =
        openThreads.map(t => `<div>• ${esc(t.description)}</div>`).join("") || "<div style='color:#9aa4b2'>No open threads</div>";
      document.getElementById("closedThreads").innerHTML = closedThreads.length
        ? `<div style='margin-top:8px;color:#6bcB77'>Closed (${closedThreads.length}):</div>` +
          closedThreads.map(t => `<div style='color:#9aa4b2;text-decoration:line-through'>✓ ${esc(t.description)}</div>`).join("")
        : "";
      const sorted = [...state.findings].sort((a, b) => SEV.indexOf(a.severity) - SEV.indexOf(b.severity));
      document.getElementById("findings").innerHTML =
        sorted.map(f => `<div class="finding"><span class="sev-${esc(f.severity)}">[${esc(f.severity)}]</span> <strong>${esc(f.title)}</strong> ${legitBtn("finding", f.title)}<br><small>${esc(f.description)}</small></div>`).join("") || "—";
      document.getElementById("timeline").innerHTML =
        state.timeline.map(t => `<div>• <small>${esc(t.timestamp)}</small> ${esc(t.description)}</div>`).join("") || "—";
      document.getElementById("mitre").innerHTML =
        state.mitreTechniques.map(m => `<div>${esc(m.id)} — ${esc(m.name)} (${esc(m.findingIds.join(", "))})</div>`).join("") || "—";
    }

    function connect() {
      const caseId = document.getElementById("caseId").value.trim();
      if (!caseId) return;
      if (ws) { try { ws.close(); } catch {} ws = null; }
      // Remember the case so a page refresh reconnects automatically.
      localStorage.setItem("dfir.caseId", caseId);
      history.replaceState(null, "", "?caseId=" + encodeURIComponent(caseId));
      fetch(`/cases/${caseId}/state`).then(r => r.json()).then(render).catch(() => {});
      pollCount(caseId);
      loadAiToggle(caseId);
      loadLegitimate(caseId);

      // Show whether AI analysis is configured at all.
      fetch("/health").then(r => r.json()).then(h => {
        if (h.aiEnabled) setAi("idle", "ready (waiting for activity)");
        else setAi("off", "off (no provider configured)");
      }).catch(() => setAi("unknown", "unknown"));

      ws = new WebSocket(`ws://${location.host}/ws?caseId=${encodeURIComponent(caseId)}`);
      ws.onopen = () => document.getElementById("status").textContent = "connected (live)";
      ws.onclose = () => document.getElementById("status").textContent = "disconnected";
      ws.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === "state") render(msg.state);
        else if (msg.type === "ai_status") applyAiStatus(msg);
      };
    }

    document.getElementById("connect").onclick = connect;
    document.getElementById("caseId").addEventListener("keydown", (e) => { if (e.key === "Enter") connect(); });
    document.getElementById("aiToggle").onclick = toggleAi;
    document.getElementById("synthesize").onclick = () => {
      const caseId = document.getElementById("caseId").value.trim();
      if (!caseId) return;
      document.getElementById("status").textContent = "synthesizing…";
      fetch(`/cases/${caseId}/synthesize`, { method: "POST" })
        .then(r => r.json())
        .then(p => {
          if (p.error) { document.getElementById("status").textContent = "synthesis failed: " + p.error; return; }
          document.getElementById("status").textContent =
            `synthesized: ${p.findings} findings, ${p.mitreTechniques} techniques` + (p.attackerPath ? ", attacker path" : "");
          // refresh state in case the WS push was missed
          fetch(`/cases/${caseId}/state`).then(r => r.json()).then(render).catch(() => {});
        })
        .catch(e => document.getElementById("status").textContent = "synthesis error: " + e.message);
    };
    document.getElementById("generateReport").onclick = () => {
      const caseId = document.getElementById("caseId").value.trim();
      if (!caseId) return;
      fetch(`/cases/${caseId}/report`, { method: "POST" })
        .then(r => r.json())
        .then(p => document.getElementById("status").textContent = `report written: ${p.markdown}`);
    };

    // On load, restore the case from the URL (?caseId=) or last session and reconnect.
    (function restore() {
      const fromUrl = new URLSearchParams(location.search).get("caseId");
      const caseId = (fromUrl || localStorage.getItem("dfir.caseId") || "").trim();
      if (caseId) {
        document.getElementById("caseId").value = caseId;
        connect();
      }
    })();
  </script>
</body>
</html>
