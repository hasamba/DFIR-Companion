name: Claude Code

# Cloud agent that responds to "@claude" mentions on issues, PRs, and review comments.
# Runs entirely in GitHub Actions (no local machine needed): it implements the request on a
# branch and opens a pull request for review. Requires:
#   1. The "Claude" GitHub App installed on this repo  -> https://github.com/apps/claude
#   2. A repo secret ANTHROPIC_API_KEY                  -> Settings > Secrets and variables > Actions
#   3. Settings > Actions > General > "Allow GitHub Actions to create and approve pull requests"
# Trigger: comment "@claude implement this and open a PR" on an issue.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when "@claude" actually appears, so unrelated comments do not burn minutes/usage.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write          # push the implementation branch
      pull-requests: write      # open the PR
      issues: write             # comment back on the issue
      id-token: write           # OIDC
      actions: read             # read CI results for context
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: pin a model or pass extra flags, e.g.
          # claude_args: "--model claude-opus-4-8"
