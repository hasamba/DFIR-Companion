name: Secret & PII Scan

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  betterleaks-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install betterleaks
        run: |
          curl -sSfL https://github.com/betterleaks/betterleaks/releases/latest/download/betterleaks_linux_amd64.tar.gz | tar -xz
          sudo mv betterleaks /usr/local/bin/

      - name: Scan git history & working tree
        run: |
          betterleaks git . \
            --config .betterleaks.toml \
            -v \
            --exit-code
