name: Deploy User Manual to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'mkdocs-docs/**'
      - 'mkdocs.yml'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build MkDocs site
        run: mkdocs build

      - name: Assemble final site
        run: |
          # Create the final site: existing landing page at root + manual at /manual/
          mkdir -p _final_site
          cp -r docs/. _final_site/
          mkdir -p _final_site/manual
          cp -r _mkdocs_site/. _final_site/manual/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _final_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
