name: Deploy User Manual to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'USER_MANUAL.md'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Jekyll site
        run: |
          # Copy the existing docs/ site (landing page + images) as the Jekyll source
          cp -r docs _jekyll_src
          # Add the manual as a /manual/ subpage — does NOT overwrite index.html
          mkdir -p _jekyll_src/manual
          printf -- '---\nlayout: default\ntitle: DFIR Companion — User Manual\n---\n\n' > _jekyll_src/manual/index.md
          cat USER_MANUAL.md >> _jekyll_src/manual/index.md

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./_jekyll_src
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
