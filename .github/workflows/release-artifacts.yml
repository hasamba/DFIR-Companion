name: Build release artifacts

# On every version tag (vX.Y.Z) build the portable Windows EXE (Node SEA) and the
# Chrome/Comet extension zip, then attach them to a GitHub Release. Runs in parallel
# with docker-publish.yml — the Docker image stays the recommended path for Linux/macOS;
# this workflow produces the "double-click on Windows" download.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach artifacts to (e.g. v0.9.0). Defaults to the workflow ref."
        required: false

permissions:
  contents: write

jobs:
  windows-exe:
    name: Build Windows EXE (Node SEA)
    runs-on: windows-latest
    outputs:
      # SHA256 of the portable zip, consumed by the `chocolatey` job so its package embeds the
      # exact checksum of the same artifact the release publishes.
      sha256: ${{ steps.zip.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: companion/package-lock.json

      - name: Install companion dependencies
        working-directory: companion
        run: npm ci

      - name: Type-check + tests
        working-directory: companion
        run: |
          npm run build
          npm test

      - name: Package SEA EXE
        working-directory: companion
        run: npm run package:sea

      - name: Zip dist-sea
        id: zip
        working-directory: companion
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $tag = $tag -replace '/', '-'   # branch refs (workflow_dispatch) contain slashes; tags don't
          $zipName = "dfir-companion-$tag-win-x64.zip"
          Compress-Archive -Path dist-sea\* -DestinationPath $zipName -Force
          $sha = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          Write-Host "SHA256: $sha"
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "sha256=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: companion/${{ env.ZIP_NAME }}
          if-no-files-found: error

  linux-appimage:
    name: Build Linux AppImage (Node SEA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: companion/package-lock.json

      - name: Install companion dependencies
        working-directory: companion
        run: npm ci

      - name: Type-check + tests
        working-directory: companion
        run: |
          npm run build
          npm test

      - name: Build Linux SEA binary
        working-directory: companion
        run: npm run package:sea

      - name: Build AppImage
        working-directory: companion
        run: npm run package:appimage

      - name: Rename + checksum
        working-directory: companion
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG="${TAG//\//-}"   # branch refs (workflow_dispatch) contain slashes; tags don't
          OUT="dfir-companion-${TAG}-x86_64.AppImage"
          mv dist-appimage/DFIR-Companion-x86_64.AppImage "dist-appimage/${OUT}"
          sha256sum "dist-appimage/${OUT}"
          echo "APPIMAGE_NAME=${OUT}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: companion/dist-appimage/${{ env.APPIMAGE_NAME }}
          if-no-files-found: error

  extension-zip:
    name: Build extension zip
    runs-on: ubuntu-latest
    outputs:
      # SHA256 of the extension zip, consumed by the `chocolatey` job which bundles it for
      # offline "Load unpacked".
      sha256: ${{ steps.zip.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Tests
        working-directory: extension
        run: npm test

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Zip dist
        id: zip
        working-directory: extension
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG="${TAG//\//-}"   # branch refs (workflow_dispatch) contain slashes; tags don't
          ZIP_NAME="dfir-capture-extension-${TAG}.zip"
          cd dist
          zip -r "../${ZIP_NAME}" .
          cd ..
          SHA=$(sha256sum "${ZIP_NAME}" | awk '{print $1}')
          echo "SHA256: ${SHA}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension/${{ env.ZIP_NAME }}
          if-no-files-found: error

  chrome-webstore:
    name: Publish to Chrome Web Store
    needs: extension-zip
    # Same gate as the GitHub Release: a real tag, or a workflow_dispatch that names one.
    # Runs independently of the `release` job so a Web Store hiccup never blocks the GitHub
    # Release (and vice-versa). No-ops cleanly until the store OAuth secrets are configured,
    # so it's safe to merge before the developer account / credentials exist (#138).
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Check for Web Store credentials
        id: creds
        env:
          CWS_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
        run: |
          if [ -n "$CWS_CLIENT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Chrome Web Store secrets not set (CHROME_CLIENT_ID/CHROME_CLIENT_SECRET/CHROME_REFRESH_TOKEN/CHROME_EXTENSION_ID). Skipping upload."
          fi

      - name: Download extension zip
        if: steps.creds.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: ext-zip

      - name: Resolve zip path
        if: steps.creds.outputs.configured == 'true'
        id: zip
        run: echo "path=$(ls ext-zip/*.zip | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Upload + publish (listed)
        if: steps.creds.outputs.configured == 'true'
        # The upload succeeds and the Store auto-publishes on upload for already-public listed
        # items; the action's separate `publish` call then gets an expected 400 because there's
        # nothing left to publish. continue-on-error here is just plumbing so the job can reach
        # the verification step below — it does NOT decide success/failure. The "Verify Chrome
        # Web Store publish" step is the real safety net: it checks the store's live version
        # against manifest.json and fails the job for real if the upload didn't actually land.
        continue-on-error: true
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ${{ steps.zip.outputs.path }}
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          # Listed extension: submit the new version for publication after upload (#138).
          publish: true

      - name: Checkout
        if: steps.creds.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Verify Chrome Web Store publish
        if: steps.creds.outputs.configured == 'true'
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          set -euo pipefail

          # --data-urlencode (not -d) is required: refresh tokens routinely contain "+", which
          # is the form-encoding escape for a space — sending it raw silently corrupts the token
          # and the token endpoint returns 400 invalid_grant.
          TOKEN_RESPONSE=$(curl -s -w '\n%{http_code}' -X POST https://oauth2.googleapis.com/token \
            --data-urlencode client_id="$CLIENT_ID" \
            --data-urlencode client_secret="$CLIENT_SECRET" \
            --data-urlencode refresh_token="$REFRESH_TOKEN" \
            --data-urlencode grant_type=refresh_token)
          TOKEN_HTTP_CODE=$(echo "$TOKEN_RESPONSE" | tail -n1)
          TOKEN_BODY=$(echo "$TOKEN_RESPONSE" | sed '$d')

          if [ "$TOKEN_HTTP_CODE" != "200" ]; then
            echo "::error::Chrome Web Store token exchange failed (HTTP $TOKEN_HTTP_CODE): $TOKEN_BODY"
            exit 1
          fi

          ACCESS_TOKEN=$(echo "$TOKEN_BODY" | jq -r '.access_token')
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "::error::Chrome Web Store token exchange returned no access_token: $TOKEN_BODY"
            exit 1
          fi

          # The Chrome Web Store API requires a projection param on items.get, even though
          # "DRAFT" is a historical name — it's the only supported value, not an indication
          # this returns unpublished-draft data instead of the live listing.
          ITEM_RESPONSE=$(curl -s -w '\n%{http_code}' -H "Authorization: Bearer $ACCESS_TOKEN" -H "x-goog-api-version: 2" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID?projection=DRAFT")
          ITEM_HTTP_CODE=$(echo "$ITEM_RESPONSE" | tail -n1)
          ITEM_BODY=$(echo "$ITEM_RESPONSE" | sed '$d')

          if [ "$ITEM_HTTP_CODE" != "200" ]; then
            echo "::error::Chrome Web Store item lookup failed (HTTP $ITEM_HTTP_CODE): $ITEM_BODY"
            exit 1
          fi

          LIVE_VERSION=$(echo "$ITEM_BODY" | jq -r '.crxVersion // "unknown"')
          EXPECTED_VERSION=$(jq -r '.version' extension/manifest.json)
          echo "Chrome Web Store live version: $LIVE_VERSION (expected: $EXPECTED_VERSION)"

          if [ "$LIVE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::Chrome Web Store item is at version $LIVE_VERSION, expected $EXPECTED_VERSION — the upload/publish did not actually go through. Check the Chrome Web Store Developer Dashboard."
            exit 1
          fi

          echo "Confirmed: Chrome Web Store is serving v$EXPECTED_VERSION."

  release:
    name: Attach to GitHub Release
    needs: [windows-exe, linux-appimage, extension-zip]
    # Only publish a Release for a real tag push, or a manual run that explicitly names a tag.
    # A tagless workflow_dispatch (e.g. a branch build to test artifacts) builds + uploads them
    # but does NOT create a junk release named after the branch.
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -exec ls -lh {} \;

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          # Fallback so the release body is never silently empty if the version heading isn't found.
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for details." > release-notes.md
          fi
          cat release-notes.md

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: release-notes.md
          files: |
            artifacts/windows-exe/*
            artifacts/linux-appimage/*
            artifacts/extension-zip/*
          fail_on_unmatched_files: true
          # Don't auto-create; the release is published manually per CLAUDE.md.
          draft: false
          prerelease: false

  chocolatey:
    name: Publish Chocolatey package
    # Runs after the release assets exist (so first-install moderation can fetch them) and reads
    # the portable zip's + extension zip's SHA256 from the windows-exe and extension-zip jobs.
    # Same tag gate as the release; the push is a no-op until the CHOCOLATEY_API_KEY secret is
    # set, so it's safe to merge beforehand (#137).
    needs: [windows-exe, extension-zip, release]
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $version = $tag -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build + pack package
        working-directory: companion
        shell: pwsh
        run: |
          node scripts/build-choco.mjs `
            --version "${{ steps.ver.outputs.version }}" `
            --checksum "${{ needs.windows-exe.outputs.sha256 }}" `
            --ext-checksum "${{ needs.extension-zip.outputs.sha256 }}" `
            --out dist-choco `
            --pack

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: chocolatey-nupkg
          path: companion/dist-choco/*.nupkg
          if-no-files-found: error

      - name: Attach nupkg to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: companion/dist-choco/*.nupkg
          draft: false
          prerelease: false

      - name: Check for Chocolatey API key
        id: creds
        env:
          CHOCO_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        shell: pwsh
        run: |
          if ($env:CHOCO_KEY) {
            "configured=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "configured=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "::notice::CHOCOLATEY_API_KEY secret not set — skipping push to the Chocolatey community repo. The .nupkg is still attached to the release."
          }

      - name: Push to Chocolatey community repo
        if: steps.creds.outputs.configured == 'true'
        working-directory: companion
        shell: pwsh
        env:
          CHOCO_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          $pkg = Get-ChildItem dist-choco\*.nupkg | Select-Object -First 1
          choco push $pkg.FullName --source https://push.chocolatey.org/ --api-key $env:CHOCO_KEY
