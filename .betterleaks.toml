# ──────────────────────────────────────────────────────────────────────────────
# gitea-access-token
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "gitea-access-token"
description = "Detected a Gitea Access Token, which may expose self-hosted Git repositories and associated code to unauthorized access."
regex = '''(?i)[\w.-]{0,50}?(?:gitea[_.-]?(?:token|key|secret|access))(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{40})(?:\\?['"\x60]|[\s;]|\\[nr]|$)'''
keywords = ["gitea"]
filter = '''
entropy(finding["secret"]) < 3.0
'''

# ──────────────────────────────────────────────────────────────────────────────
# github-app-token
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "github-app-token"
description = "Identified a GitHub App Token, which may compromise GitHub application integrations and source code security."
regex = '''(?:ghu|ghs)_[0-9a-zA-Z]{36}'''
keywords = [
    "ghu_",
    "ghs_",
]
validate = '''
let base_url = env.getOrDefault("GITHUB_BASE_URL", "https://api.github.com"); (let r = http.get(base_url + "/app", {
      "Accept": "application/vnd.github+json",
      "Authorization": "Bearer " + finding["secret"]
    }); r.status == 200 && (r.json?.slug ?? "") != "" ? {
      "result": "valid",
      "slug": (r.json?.slug ?? ""),
      "name": (r.json?.name ?? ""),
      "html_url": (r.json?.html_url ?? ""),
      "external_url": (r.json?.external_url ?? "")
    } : r.status in [401, 403] ? {
      "result": "invalid",
      "reason": "Unauthorized"
    } : validate.unknown(r))
'''
filter = '''
entropy(finding["secret"]) <= 3.0
|| matchesAny((attributes["path"] ?? ""), [`(?:^|/)@octokit/auth-token/README\.md$`])
'''

