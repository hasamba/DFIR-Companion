# ──────────────────────────────────────────────────────────────────────────────
# flyio-access-token
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "flyio-access-token"
description = "Uncovered a Fly.io API key"
regex = '''\b(FlyV1\s[A-Za-z0-9=_\-,/+]{100,})(?:\\?['"\x60]|[\s;]|\\[nr]|$)'''
keywords = ["flyv1"]
validate = '''
let r = http.post("https://api.fly.io/graphql", {
    "Authorization": "Bearer " + finding["secret"],
    "Content-Type": "application/json"
  }, "{\"query\": \"query { viewer { id email name } }\"}"); r.status == 200 && (r.body contains "\"data\"") && (r.body contains "\"viewer\"") && (r.body contains "\"email\"") ? {
    "result": "valid",
    "email": (r.json?.data?.viewer?.email ?? ""),
    "name": (r.json?.data?.viewer?.name ?? "")
  } : r.status in [401, 403] ? {
    "result": "invalid",
    "reason": "Unauthorized"
  } : validate.unknown(r)
'''
filter = '''
entropy(finding["secret"]) <= 4.0
'''

