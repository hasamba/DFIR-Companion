# ──────────────────────────────────────────────────────────────────────────────
# zai-api-key
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "zai-api-key"
description = "Detected a Z.ai API key, which may expose GLM model access and usage to unauthorized parties."
regex = '''(?i)[\w.-]{0,50}?(?:zai|z_ai|z\.ai|glm|zlm)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{32}\.[a-z0-9]{16})(?:\\?['"\x60]|[\s;]|\\[nr]|$)'''
keywords = [
    "zai",
    "z_ai",
    "z.ai",
    "glm",
    "zlm",
]
validate = '''
let r = http.post("https://api.z.ai/api/paas/v4/tokenizer", {
    "Authorization": "Bearer " + finding["secret"],
    "Accept": "application/json",
    "Content-Type": "application/json"
  },
  "{" +
    "\"model\":\"glm-4.6\"," +
    "\"messages\":[{\"role\":\"user\",\"content\":\"hello\"}]" +
  "}"); r.status == 200 && (r.body contains '"usage"') ? {
    "result": "valid"
  } : r.status == 429 && (r.body contains "Insufficient balance") ? {
    "result": "valid",
    "reason": "Insufficient balance but still valid"
  } : r.status in [401, 403] ? {
    "result": "invalid",
    "reason": "Unauthorized"
  } : validate.unknown(r)
'''
filter = '''
entropy(finding["secret"]) <= 3.5
'''

