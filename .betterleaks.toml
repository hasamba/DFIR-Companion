    "result": "valid",
    "email": (r.json?.email ?? ""),
    "handle": (r.json?.handle ?? ""),
    "id": (r.json?.id ?? "")
  } : r.status in [401, 403] || (r.body contains "Invalid token") ? {
    "result": "invalid",
    "reason": "Unauthorized"
  } : validate.unknown(r)
'''
filter = '''
entropy(finding["secret"]) <= 3.5
'''

