[[rules]]
id = "facebook-secret"
description = "Discovered a Facebook Application secret, posing a risk of unauthorized access to Facebook accounts and personal data exposure."
regex = '''(?i)[\w.-]{0,50}?(?:facebook)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{32})(?:\\?['"\x60]|[\s;]|\\[nr]|$)'''
keywords = ["facebook"]
filter = '''
entropy(finding["secret"]) <= 3.0
'''

# ──────────────────────────────────────────────────────────────────────────────
# fastly-api-token
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "fastly-api-token"
description = "Uncovered a Fastly API key, which may compromise CDN and edge cloud services, leading to content delivery and security issues."
regex = '''(?i)[\w.-]{0,50}?(?:fastly)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9_-]{32})(?:\\?['"\x60]|[\s;]|\\[nr]|$)'''
keywords = ["fastly"]
validate = '''
let r = http.get("https://api.fastly.com/current_user", {
    "Fastly-Key": finding["secret"]
  }); r.status == 200 ? {
    "result": "valid",
    "login": (r.json?.login ?? ""),
    "name": (r.json?.name ?? ""),
    "customer_id": (r.json?.customer_id ?? "")
  } : r.status in [401, 403] ? {
    "result": "invalid",
    "reason": "Unauthorized"
  } : validate.unknown(r)
'''
filter = '''
entropy(finding["secret"]) <= 3.5
'''

# ──────────────────────────────────────────────────────────────────────────────
# figma-personal-access-header-token
# ──────────────────────────────────────────────────────────────────────────────
[[rules]]
id = "figma-personal-access-header-token"
description = "Uncovered a Figma Personal Access Token in a header, which may compromise design assets and team collaboration."
regex = '''(?i)[\w.-]{0,50}?(?:x-figma-token|xfigmatoken|x_figma_token)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([0-9A-F]{4}-[0-9A-F]{8}(?:-[0-9A-F]{4}){3}-[0-9A-F]{12})(?:\\?['"\x60]|[\s;]|\\[nr]|$)'''
keywords = [
    "x-figma-token",
    "xfigmatoken",
    "x_figma_token",
]
validate = '''
let r = http.get("https://api.figma.com/v1/me", {
    "X-Figma-Token": finding["secret"]
  }); r.status == 200 && !(r.body contains "Invalid token") ? {
    "result": "valid",
    "email": (r.json?.email ?? ""),
    "handle": (r.json?.handle ?? ""),
    "id": (r.json?.id ?? "")
  } : r.status in [401, 403] || (r.body contains "Invalid token") ? {
    "result": "invalid",
    "reason": "Unauthorized"
  } : validate.unknown(r)
'''

# ──────────────────────────────────────────────────────────────────────────────
# figma-personal-access-token
# ──────────────────────────────────────────────────────────────────────────────
