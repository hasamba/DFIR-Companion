      "name": (r.json?.name ?? ""),
      "scopes": (r.headers["x-oauth-scopes"] ?? "")
    } : r.status in [401, 403] ? {
      "result": "invalid",
      "reason": "Unauthorized"
    } : validate.unknown(r))
'''
filter = '''
entropy(finding["secret"]) <= 3.0
'''

